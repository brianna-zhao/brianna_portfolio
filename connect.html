<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Nunito', sans-serif;
      overflow-y: auto;
      background:
        radial-gradient(ellipse at 20% 60%, rgba(20, 50, 130, 0.45) 0%, transparent 42%),
        radial-gradient(ellipse at 80% 70%, rgba(15, 40, 110, 0.38) 0%, transparent 38%),
        linear-gradient(to bottom, #010208 0%, #020512 55%, #03091c 100%);
      color: rgba(190, 225, 255, 0.88);
      position: relative;
      isolation: isolate;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('bg.png') center / cover no-repeat;
      /* sepia→hue-rotate shifts image to sky-blue (~#b3d9ff) */
      filter: sepia(1) hue-rotate(180deg) saturate(2) brightness(0.85);
      mix-blend-mode: screen;   /* dark photo areas invisible, bright areas glow blue */
      opacity: 0.65;
      z-index: -1;
      pointer-events: none;
    }

    /* ── Shared Header ─────────────────────────────────────────── */
    .page-header {
      position: fixed; top: 0; left: 0; right: 0; height: 82px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      background: rgba(2, 5, 18, 0.78);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(100, 170, 255, 0.25);
      z-index: 200;
    }
    .site-logo { display: block; text-decoration: none; }
    .site-logo img {
      height: 70px; width: auto;
      filter: drop-shadow(0 0 6px rgba(200, 230, 210, 0.3));
      transition: filter 0.3s, transform 0.3s;
    }
    .site-logo:hover img {
      filter: drop-shadow(0 0 16px rgba(200, 230, 210, 0.85));
      transform: scale(1.07);
    }
    .nav {
      display: flex; gap: 6px; align-items: center;
      background: rgba(5, 12, 35, 0.82);
      border: 1px solid rgba(100, 170, 255, 0.45);
      border-radius: 40px; padding: 10px 18px;
      backdrop-filter: blur(16px); overflow: visible;
    }
    .nav-tab {
      display: inline-block; padding: 9px 26px; border-radius: 28px;
      font-size: 16px; font-family: 'Georgia', serif; letter-spacing: 1px;
      text-decoration: none; border: 1.5px solid transparent;
      transition: all 0.28s ease; background: transparent;
    }
    .nav-tab.about   { color: #ffb3c6; }
    .nav-tab.project { color: #c9b3ff; }
    .nav-tab.connect { color: #b3d9ff; }
    .nav-tab.about:hover { border-color:#ffb3c6; background:rgba(255,179,198,0.07); box-shadow:0 0 10px rgba(255,179,198,0.6),0 0 24px rgba(255,179,198,0.22); }
    .nav-tab.project:hover, .nav-dropdown-wrap:hover .nav-tab.project { border-color:#c9b3ff; background:rgba(201,179,255,0.07); box-shadow:0 0 10px rgba(201,179,255,0.6),0 0 24px rgba(201,179,255,0.22); }
    .nav-tab.connect:hover { border-color:#b3d9ff; background:rgba(179,217,255,0.07); box-shadow:0 0 10px rgba(179,217,255,0.6),0 0 24px rgba(179,217,255,0.22); }
    .nav-dropdown-wrap { position: relative; }
    .project-dropdown {
      position: absolute; top: calc(100% + 14px); left: 50%;
      transform: translateX(-50%) translateY(-8px); min-width: 152px;
      background: rgba(6,24,8,0.95); border: 1px solid rgba(28,75,35,0.55);
      border-radius: 20px; padding: 8px 6px; backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease; z-index: 400;
    }
    .project-dropdown::before { content:''; position:absolute; bottom:100%; left:0; right:0; height:18px; }
    .nav-dropdown-wrap:hover .project-dropdown { opacity:1; pointer-events:all; transform:translateX(-50%) translateY(0); }
    .dropdown-item { display:block; padding:9px 18px; color:#c9b3ff; font-size:14px; font-family:'Georgia',serif; letter-spacing:0.7px; text-decoration:none; border-radius:14px; border:1.5px solid transparent; transition:all 0.22s ease; }
    .dropdown-item:hover { border-color:#c9b3ff; background:rgba(201,179,255,0.08); box-shadow:0 0 8px rgba(201,179,255,0.45); }

    /* ── Page content ───────────────────────────────────────────── */
    main {
      padding-top: 82px;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding-bottom: 80px;
    }

    .connect-inner {
      max-width: 860px;
      width: 92%;
      text-align: center;
      padding: 60px 0 40px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(64px, 10vw, 110px);
      font-weight: 900;
      letter-spacing: 0.12em;
      color: rgba(200, 228, 255, 0.95);
      text-shadow:
        0 0 40px rgba(100, 170, 255, 0.55),
        0 0 80px rgba(60, 130, 240, 0.25);
      margin-bottom: 18px;
      line-height: 1;
    }

    .subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: 16px; color: rgba(140, 190, 255, 0.62);
      letter-spacing: 0.5px; margin-bottom: 60px;
    }

    .divider {
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(120, 180, 255, 0.65), transparent);
      margin: 0 auto 60px;
    }

    /* Social grid */
    .social-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 860px;
      width: 92%;
      padding-bottom: 60px;
    }

    .social-card {
      display: flex;
      align-items: center;
      gap: 16px;
      width: calc(50% - 10px);
      min-width: 280px;
      padding: 20px 24px;
      background: rgba(5, 12, 38, 0.82);
      border: 1px solid rgba(80, 150, 255, 0.28);
      border-radius: 18px;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.28s ease;
    }
    .social-card:hover {
      border-color: rgba(120, 180, 255, 0.60);
      background: rgba(8, 18, 55, 0.92);
      box-shadow: 0 0 18px rgba(100, 160, 255, 0.24), 0 0 40px rgba(60, 120, 230, 0.12);
      transform: translateY(-2px);
    }

    .social-icon-wrap {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(8, 18, 55, 0.92);
      border: 1px solid rgba(100, 160, 255, 0.32);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: rgba(150, 200, 255, 0.75);
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-align: center;
    }

    .social-info { text-align: left; }
    .social-name {
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 600;
      color: rgba(200, 228, 255, 0.90);
      margin-bottom: 3px;
    }
    .social-handle {
      font-family: 'Nunito', sans-serif;
      font-size: 13px; color: rgba(120, 170, 240, 0.58);
      letter-spacing: 0.3px;
    }

    .name-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(20px, 3.5vw, 38px);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(150, 200, 255, 0.52);
      text-shadow:
        0 0 22px rgba(100, 160, 255, 0.30),
        0 0 50px rgba(60, 120, 230, 0.14);
      text-align: center;
      line-height: 1.2;
      margin-bottom: 16px;
    }
  </style>
</head>
