<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    /* ─── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ─── Scene ──────────────────────────────────────────────────── */
    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      background:
        radial-gradient(ellipse at 10% 70%, rgba(20, 60, 25, 0.4) 0%, transparent 40%),
        radial-gradient(ellipse at 90% 75%, rgba(15, 50, 18, 0.35) 0%, transparent 35%),
        radial-gradient(ellipse at 50% 100%, rgba(12, 40, 14, 0.6) 0%, transparent 50%),
        linear-gradient(to bottom, #010202 0%, #020503 50%, #040c04 100%);
      overflow: hidden;
    }

    /* ─── Stars ──────────────────────────────────────────────────── */
    #stars { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%;
      background: rgba(215, 245, 220, 0.9);
      animation: starLife var(--dur, 12s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    /* Stars cycle through birth → shimmer → death, staggered so
       some are appearing while others are fading out at any moment */
    @keyframes starLife {
      0%   { opacity: 0;    transform: scale(0.1); }
      6%   { opacity: 0;    transform: scale(0.1); }
      14%  { opacity: 0.85; transform: scale(1.15); }
      22%  { opacity: 0.25; transform: scale(0.88); }
      34%  { opacity: 0.95; transform: scale(1.08); }
      48%  { opacity: 0.18; transform: scale(0.92); }
      60%  { opacity: 0.9;  transform: scale(1.12); }
      72%  { opacity: 0.3;  transform: scale(0.9);  }
      82%  { opacity: 0.75; transform: scale(1.05); }
      90%  { opacity: 0.1;  transform: scale(0.6);  }
      96%  { opacity: 0;    transform: scale(0.15); }
      100% { opacity: 0;    transform: scale(0.1);  }
    }

    /* ─── Grass ──────────────────────────────────────────────────── */
    .grass-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 36vh;
      z-index: 4; overflow: hidden;
    }
    .grass-wrap img {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: bottom;
      filter: brightness(0.18) saturate(1.1) hue-rotate(5deg);
    }
    /* Fade top of grass into dark sky */
    .grass-wrap::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 52%;
      background: linear-gradient(to bottom, rgba(2, 6, 3, 1) 0%, transparent 100%);
      z-index: 1;
    }
    /* Ground haze */
    .ground-haze {
      position: absolute; bottom: 33vh; left: 0; right: 0;
      height: 10vh;
      background: linear-gradient(to bottom, transparent 0%, rgba(3, 12, 4, 0.65) 100%);
      z-index: 3; pointer-events: none;
    }

    /* ─── Mushrooms ──────────────────────────────────────────────── */
    /*
      SIZING:
        Wrapper   : 210 × 310 px  (the "above-ground" viewport for each mushroom)
        Image     : width 470px → height auto ≈ 326px  (470 × 1640/2360)
        image top (bottom:0, no transform): 310 − 326 = −16px
          → image overflows 16px at the top; cap is fully visible, ✓
        Cap height : 38% × 326 ≈ 124px
        Stem ht    : 62% × 326 ≈ 202px

        Default translateY = 202px → stem pushed below wrapper bottom → clipped
        Hover   translateY = 0    → full mushroom visible

      CENTERING:
        Mushroom character spans x ≈ 40–870 of 2360px image.
        Center ≈ 455 px → 455/2360 × 470 ≈ 91px from image left.
        Wrapper center = 105px. Offset = 105 − 91 = 14px.
        So left: 14px centers the character in the 210px wrapper.

      GLOW (no box):
        filter is on the WRAPPER (which has overflow:hidden).
        overflow:hidden clips the image first, THEN the filter is applied
        to the clipped result — so the glow hugs only the visible mushroom
        shape, never the full image rectangle.
        Small blur radii (1–8px) give a tight neon-outline feel.
    */
    .mushrooms-stage {
      position: absolute; inset: 0;
      z-index: 6; pointer-events: none;
    }
    .mushroom-slot {
      position: absolute;
      transform: translateX(-50%) scale(var(--ms, 1));
      transform-origin: bottom center;
      pointer-events: all;
    }

    /*
      Wrapper 260 × 345 px — generous room so nothing gets clipped.
      image 470px wide → auto-height ≈ 326px
      image top (bottom:0): 345−326 = 19px  ← clear margin at top, no cutoff
      cap  38% × 326 ≈ 124px  |  stem 62% ≈ 202px
      default translateY = 345 − 19 − 124 = 202px
      centering: char centre @91px, wrapper centre @130px → left:39px
      char right edge: 39 + (870/2360)×470 ≈ 39+173 = 212px < 260px  ← no right cutoff
    */
    .mushroom-wrapper {
      position: relative;
      width: 260px; height: 345px;
      overflow: hidden;
      filter:
        drop-shadow(0 0 1px rgba(185, 255, 215, 1))
        drop-shadow(0 0 3px rgba(140, 245, 180, 0.9))
        drop-shadow(0 0 7px rgba(95,  215, 145, 0.65));
      transition: filter 0.4s ease;
    }
    .mushroom-slot:hover .mushroom-wrapper {
      filter:
        drop-shadow(0 0 1px rgba(220, 255, 235, 1))
        drop-shadow(0 0 3px rgba(180, 255, 210, 1))
        drop-shadow(0 0 8px rgba(115, 235, 170, 0.9))
        drop-shadow(0 0 18px rgba(80,  205, 135, 0.7));
    }

    .mushroom-img {
      position: absolute;
      bottom: 0;
      left: 39px;           /* centers character in 260px wrapper */
      width: 470px;
      height: auto;         /* ≈ 326px */
      transform: translateY(202px);   /* default: cap only visible */
      transition: transform 0.72s cubic-bezier(0.34, 1.52, 0.64, 1);
    }
    .mushroom-slot:hover .mushroom-img {
      transform: translateY(0);
    }

    /* Soft ground glow under each cap (fades on hover) */
    .cap-glow {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 240px; height: 60px; border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(80, 210, 130, 0.38) 0%, transparent 70%);
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .mushroom-slot:hover .cap-glow { opacity: 0; }

    /* ── M1: mushroom2.png — green/boba glow ────────────────────── */
    /* mushroom2.png: char x-centre=51.7%→left=-113px; char starts y=29→show less */
    .mushroom-img.m2-img {
      left: -113px;
      transform: translateY(175px);   /* cap dome y=29–130; show full 101px cap */
    }
    .mushroom-slot:hover .mushroom-img.m2-img { transform: translateY(0); }

    .cap-glow.boba-glow {
      background: radial-gradient(ellipse at center,
        rgba(90, 210, 80, 0.36) 0%, transparent 70%);
    }

    /* ── M2: rockmush.png — teal/rock glow (reuses .rock) ────────── */
    /* rockmush.png: char x-centre=42.3%→left=-69px; char starts y=103→tiny translateY */
    .mushroom-img.rockmush-img {
      left: -69px;
      transform: translateY(50px);    /* big dome y=103–261 (158px); show full cap */
    }
    .mushroom-slot:hover .mushroom-img.rockmush-img { transform: translateY(0); }

    /* ── M3: wirkmush.png — pink/wirk glow ──────────────────────── */
    /* wirkmush.png: 420px wide→292px tall; char starts y=22; cap needs more room */
    .mushroom-img.wirkmush-img {
      left: 22px;
      width: 420px; height: auto;     /* 292px tall at this width */
      transform: translateY(160px);   /* cap y=22–127 (105px); hide body below */
    }
    .mushroom-slot:hover .mushroom-img.wirkmush-img { transform: translateY(0); }
    .mushroom-wrapper.wirk-glow {
      width: 420px;
      filter:
        drop-shadow(0 0 1px rgba(255, 140, 190, 1))
        drop-shadow(0 0 3px rgba(220, 90, 140, 0.9))
        drop-shadow(0 0 7px rgba(190, 46, 92, 0.65));
    }
    .mushroom-slot:hover .mushroom-wrapper.wirk-glow {
      filter:
        drop-shadow(0 0 1px rgba(255, 180, 210, 1))
        drop-shadow(0 0 3px rgba(240, 130, 175, 1))
        drop-shadow(0 0 8px rgba(210, 70, 120, 0.9))
        drop-shadow(0 0 20px rgba(180, 40, 90, 0.7));
    }
    .cap-glow.wirk-glow {
      background: radial-gradient(ellipse at center,
        rgba(200, 60, 110, 0.36) 0%, transparent 70%);
    }

    /* ── Keep amber defs in case referenced elsewhere ─────────────── */
    .mushroom-img.amber-img { left: -50px; }
    .cap-glow.amber {
      background: radial-gradient(ellipse at center,
        rgba(210, 120, 30, 0.38) 0%, transparent 70%);
    }
    .content-box.amber {
      background: rgba(20, 8, 2, 0.93);
      border-color: rgba(210, 130, 45, 0.45);
      box-shadow: 0 0 32px rgba(185, 100, 20, 0.2),
                  inset 0 0 22px rgba(150, 80, 10, 0.06);
    }
    .content-box.amber .content-media {
      background: rgba(14, 5, 1, 0.85);
      border-color: rgba(210, 130, 45, 0.2);
      color: rgba(210, 130, 45, 0.5);
    }
    .content-box.amber .content-title {
      color: rgba(255, 190, 110, 0.92);
    }

    /* ── Wïrk / Project 1 content box (crimson + rose) ──────────── */
    .content-box.wirk {
      background: rgba(18, 6, 16, 0.93);
      border-color: rgba(190, 46, 92, 0.48);
      box-shadow: 0 0 32px rgba(190, 46, 92, 0.22),
                  inset 0 0 22px rgba(140, 30, 70, 0.06);
    }
    .content-box.wirk .content-title {
      color: rgba(255, 195, 215, 0.92);
    }
    /* Mockup image inside the wirk content box */
    .wirk-media {
      width: 100%; height: 175px;
      border-radius: 11px;
      border: 1px solid rgba(190, 46, 92, 0.18);
      overflow: hidden;
      margin-bottom: 13px;
    }
    .wirk-mockup-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ── rockrock mushroom babe / Project 2 (sky-blue + jewel-green) ── */
    .mushroom-wrapper.rock {
      filter:
        drop-shadow(0 0 1px rgba(100, 210, 255, 1))
        drop-shadow(0 0 3px rgba(60, 180, 240, 0.9))
        drop-shadow(0 0 7px rgba(0, 140, 200, 0.65));
    }
    .mushroom-slot:hover .mushroom-wrapper.rock {
      filter:
        drop-shadow(0 0 1px rgba(150, 235, 255, 1))
        drop-shadow(0 0 3px rgba(100, 210, 255, 1))
        drop-shadow(0 0 9px rgba(40, 175, 240, 0.9))
        drop-shadow(0 0 20px rgba(0, 130, 210, 0.7));
    }
    .cap-glow.rock {
      background: radial-gradient(ellipse at center,
        rgba(0, 160, 220, 0.38) 0%, transparent 70%);
    }
    .content-box.rock {
      background: linear-gradient(145deg,
        rgba(8, 22, 45, 0.96) 0%,
        rgba(10, 60, 46, 0.93) 100%);
      border-color: rgba(55, 185, 225, 0.52);
      box-shadow: 0 0 32px rgba(0, 160, 215, 0.24),
                  inset 0 0 24px rgba(0, 120, 155, 0.07);
    }
    .content-box.rock .content-title {
      color: rgba(120, 232, 255, 0.93);
    }

    /* ── EVIL Boba content box (grey/green theme) ─────────────────── */
    .content-box.boba {
      background: rgba(16, 20, 16, 0.95);
      border-color: rgba(100, 210, 90, 0.46);
      box-shadow: 0 0 32px rgba(80, 200, 80, 0.20),
                  inset 0 0 20px rgba(60, 160, 60, 0.06);
    }
    .content-box.boba .content-title {
      color: rgba(160, 240, 140, 0.93);
    }
    /* Three mini phone frames inside the boba content box */
    .boba-phones {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
      height: 172px;
      margin-bottom: 13px;
    }
    .boba-phone {
      width: 78px;
      height: 160px;
      border-radius: 14px;
      background: #111;
      border: 2px solid #333;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow:
        0 0 0 1px rgba(100,210,90,0.12),
        0 0 10px rgba(80,200,80,0.28);
      outline: 1px dashed rgba(120, 220, 100, 0.50);
      outline-offset: 3px;
    }
    .boba-figma {
      position: absolute;
      top: 0; left: 0;
      width: 393px; height: 852px;
      border: none;
      transform: scale(0.197);
      transform-origin: top left;
      pointer-events: none;
    }
    /* Video preview */
    .rock-media {
      width: 100%; height: 175px;
      border-radius: 11px;
      border: 1px solid rgba(55, 185, 225, 0.25);
      overflow: hidden;
      margin-bottom: 13px;
      position: relative;
    }
    .rock-video {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }
    /* Floating bubbles at the video / title seam */
    .rock-bubbles {
      position: absolute;
      left: 0; right: 0;
      top: 204px; /* padding-top(18) + media-height(175) + margin(13) - 2 */
      height: 0;
      pointer-events: none;
      z-index: 10;
      overflow: visible;
    }
    .rb {
      position: absolute;
      border-radius: 50%;
      animation-name: rbFloat;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    /* alternating neon-blue and purple, each with distinct opacity */
    .rb1 { width:7px;  height:7px;  left:8%;  top:-4px;  background:rgba(50,205,255,0.80); box-shadow:0 0 9px rgba(50,205,255,0.70); animation-duration:2.7s; animation-delay:0s; }
    .rb2 { width:5px;  height:5px;  left:20%; top:-9px;  background:rgba(155,85,255,0.52); box-shadow:0 0 8px rgba(155,85,255,0.46); animation-duration:3.3s; animation-delay:0.6s; }
    .rb3 { width:10px; height:10px; left:38%; top:-3px;  background:rgba(0,220,255,0.68);  box-shadow:0 0 13px rgba(0,220,255,0.60); animation-duration:2.4s; animation-delay:1.1s; }
    .rb4 { width:4px;  height:4px;  left:57%; top:-8px;  background:rgba(195,75,255,0.43); box-shadow:0 0 7px rgba(195,75,255,0.38); animation-duration:3.6s; animation-delay:0.3s; }
    .rb5 { width:8px;  height:8px;  left:72%; top:-5px;  background:rgba(75,175,255,0.62); box-shadow:0 0 10px rgba(75,175,255,0.56); animation-duration:2.9s; animation-delay:1.7s; }
    .rb6 { width:6px;  height:6px;  left:87%; top:-4px;  background:rgba(215,95,255,0.48); box-shadow:0 0 9px rgba(215,95,255,0.42); animation-duration:3.1s; animation-delay:0.9s; }
    @keyframes rbFloat {
      0%, 100% { transform: translate(0,    0px) scale(1.00); opacity: 0.62; }
      30%       { transform: translate(-4px,-14px) scale(1.12); opacity: 1.00; }
      65%       { transform: translate( 3px,-22px) scale(0.92); opacity: 0.80; }
    }

    /* ─── Content box ────────────────────────────────────────────── */
    .content-box {
      position: absolute;
      bottom: 60px;
      width: 320px;
      background: rgba(3, 16, 7, 0.92);
      border: 1px solid rgba(80, 200, 120, 0.42);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 0 32px rgba(55, 175, 95, 0.18),
                  inset 0 0 22px rgba(40, 120, 70, 0.05);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.38s ease 0.22s, transform 0.38s ease 0.22s;
    }
    .content-box.right {
      left: calc(100% + 18px);
      transform: translateX(-18px);
    }
    .content-box.left {
      right: calc(100% + 6px);
      transform: translateX(18px);
    }
    /* Raise the hovered slot above all siblings so its content box
       is never obscured by a neighbouring mushroom or its content. */
    .mushroom-slot:hover {
      z-index: 100;
    }
    .mushroom-slot:hover .content-box {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }
    .content-media {
      width: 100%; height: 175px;
      background: rgba(6, 26, 12, 0.8);
      border-radius: 11px;
      border: 1px dashed rgba(80, 200, 120, 0.2);
      display: flex; align-items: center; justify-content: center;
      color: rgba(100, 200, 140, 0.4);
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 13px;
    }
    .content-title {
      color: rgba(190, 255, 215, 0.9);
      font-size: 15px; letter-spacing: 0.6px; text-align: center;
    }

    /* ─── Logo ───────────────────────────────────────────────────── */
    .logo {
      position: fixed; top: 22px; left: 26px;
      z-index: 300; text-decoration: none; display: block;
    }
    .logo img {
      height: 90px; width: auto;
      filter: drop-shadow(0 0 6px rgba(200, 230, 210, 0.3));
      transition: filter 0.3s ease;
    }
    /* hover transform only applies after hop animation is done */
    .logo.hop-done img {
      transition: filter 0.3s ease, transform 0.3s ease;
    }
    .logo.hop-done:hover img {
      filter: drop-shadow(0 0 16px rgba(200, 230, 210, 0.85));
      transform: scale(1.07);
    }

    /* ─── Navigation ─────────────────────────────────────────────── */
    .nav {
      position: fixed; top: 24px; right: 26px;
      z-index: 300;
      display: flex; gap: 6px; align-items: center;
      background: rgba(6, 24, 8, 0.8);
      border: 1px solid rgba(28, 75, 35, 0.55);
      border-radius: 40px;
      padding: 10px 18px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      /* Allow dropdown to overflow below the pill */
      overflow: visible;
    }
    .nav-tab {
      display: inline-block;
      padding: 9px 26px; border-radius: 28px;
      font-size: 16px; font-family: 'Georgia', serif;
      letter-spacing: 1px; text-decoration: none;
      border: 1.5px solid transparent;
      transition: all 0.28s ease; background: transparent;
    }
    .nav-tab.about   { color: #ffb3c6; }
    .nav-tab.project { color: #c9b3ff; }
    .nav-tab.connect { color: #b3d9ff; }

    .nav-tab.about:hover {
      border-color: #ffb3c6; background: rgba(255, 179, 198, 0.07);
      box-shadow: 0 0 10px rgba(255, 179, 198, 0.6),
                  0 0 24px rgba(255, 179, 198, 0.22),
                  inset 0 0 12px rgba(255, 179, 198, 0.07);
    }
    .nav-tab.connect:hover {
      border-color: #b3d9ff; background: rgba(179, 217, 255, 0.07);
      box-shadow: 0 0 10px rgba(179, 217, 255, 0.6),
                  0 0 24px rgba(179, 217, 255, 0.22),
                  inset 0 0 12px rgba(179, 217, 255, 0.07);
    }

    /* ─── Project dropdown ───────────────────────────────────────── */
    /* Wrapper holds both the tab and the dropdown menu as one hover zone */
    .nav-dropdown-wrap {
      position: relative;
    }
    /* The project tab acts as the trigger */
    .nav-dropdown-wrap .nav-tab.project {
      display: block; /* full-width within wrapper for easier hover */
    }
    .nav-dropdown-wrap:hover .nav-tab.project,
    .nav-tab.project:hover {
      border-color: #c9b3ff; background: rgba(201, 179, 255, 0.07);
      box-shadow: 0 0 10px rgba(201, 179, 255, 0.6),
                  0 0 24px rgba(201, 179, 255, 0.22),
                  inset 0 0 12px rgba(201, 179, 255, 0.07);
    }

    /* The dropdown panel */
    .project-dropdown {
      position: absolute;
      top: calc(100% + 14px); /* gap below the tab */
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      min-width: 160px;
      background: rgba(6, 24, 8, 0.92);
      border: 1px solid rgba(28, 75, 35, 0.55);
      border-radius: 20px;
      padding: 8px 6px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                  0 0 16px rgba(55, 130, 75, 0.15);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease;
      z-index: 400;
    }
    /* Bridge the gap so mouse can travel from tab to dropdown */
    .project-dropdown::before {
      content: '';
      position: absolute;
      bottom: 100%; left: 0; right: 0;
      height: 18px; /* covers the gap */
    }
    /* Show dropdown when hovering the wrapper */
    .nav-dropdown-wrap:hover .project-dropdown {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }

    .dropdown-item {
      display: block;
      padding: 9px 18px;
      color: #c9b3ff;
      font-size: 14px; font-family: 'Georgia', serif;
      letter-spacing: 0.7px;
      text-decoration: none;
      border-radius: 14px;
      border: 1.5px solid transparent;
      transition: all 0.22s ease;
    }
    .dropdown-item:hover {
      border-color: #c9b3ff;
      background: rgba(201, 179, 255, 0.08);
      box-shadow: 0 0 8px rgba(201, 179, 255, 0.45),
                  0 0 18px rgba(201, 179, 255, 0.15),
                  inset 0 0 8px rgba(201, 179, 255, 0.06);
    }
  </style>
</head>
<body>

<!-- ══════════════════ SCENE ══════════════════ -->
<div class="scene">

  <div id="stars"></div>
  <div class="ground-haze"></div>

  <!-- ── Mushrooms (scattered: different x AND y, not in a line) ── -->
  <div class="mushrooms-stage">

    <!-- M1: far-left, mid-depth — EVIL Boba -->
    <div class="mushroom-slot" style="left:8%; bottom:20vh; --ms:0.88; cursor:pointer;" onclick="window.location.href='project-3.html'">
      <div class="mushroom-wrapper">
        <img src="mushroom2.png" class="mushroom-img m2-img" alt="mushroom">
      </div>
      <div class="cap-glow boba-glow"></div>
      <div class="content-box right boba">
        <div class="boba-phones">
          <div class="boba-phone">
            <iframe class="boba-figma"
              src="https://embed.figma.com/design/mA5nd9m5KgbvaNvf55LBkw/Peter-and-Brianna-Heytea-Dark-Pattern-Prototype?node-id=122-181&embed-host=share&hide-ui=1"
              allowfullscreen></iframe>
          </div>

<script>
  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 0.4 + Math.random() * 2.6;
    const dur = (8 + Math.random() * 12).toFixed(2);
    const delay = -(Math.random() * parseFloat(dur) * 2).toFixed(2);
    s.style.cssText =
      `width:${size}px;height:${size}px;` +
      `top:${Math.random() * 62}%;left:${Math.random() * 100}%;` +
      `--dur:${dur}s;animation-delay:${delay}s;`;
    starsEl.appendChild(s);
  }

  /* ── Per-mushroom ambient glow ── */
  document.querySelectorAll('.mushroom-slot').forEach(slot => {
    const amb = document.createElement('div');
    amb.style.cssText =
      'position:absolute;bottom:0;left:50%;' +
      'transform:translateX(-50%);' +
      'width:380px;height:240px;border-radius:50%;' +
      'background:radial-gradient(ellipse at 50% 85%,' +
        'rgba(55,175,95,0.09) 0%,transparent 68%);' +
      'pointer-events:none;z-index:0;transition:opacity 0.45s ease;';
    slot.appendChild(amb);
    slot.addEventListener('mouseenter', () => amb.style.opacity = '0');
    slot.addEventListener('mouseleave', () => amb.style.opacity = '1');
  });

  /* ── Logo bunny hop-in animation ──────────────────────────────────
     Bunny enters from off the RIGHT edge, large (scale 2.0).
     It hops across every mushroom left-ward — M4 → M3 → M2 → M1 —
     shrinking with each landing, then leaps up to settle in the
     nav corner at its final size (scale 1).                          */
  window.addEventListener('load', () => {
    const logo = document.querySelector('.logo');
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    /* Logo final anchor: fixed top-left = (26, 22).
       All translate() values are offsets from this point. */
    const lx = 26, ly = 22;

    /* sit: how many px above stem top the logo hovers so it looks
       perched ON the cap rather than inside it.  */
    const sit = 48;

    /* Per-mushroom cap Y: (1 − bottomVh) × vh − stemPx − sit
       Formulas  stem = mushroom_image_height × scale × 0.62
                 mushroom_image_height ≈ 326 px                      */
    const m4x = vw * 0.87 - lx,  m4y = vh * 0.83 - Math.round(326 * 0.80 * 0.62) - sit - ly;
    const m3x = vw * 0.63 - lx,  m3y = vh * 0.78 - Math.round(326 * 0.97 * 0.62) - sit - ly;
    const m2x = vw * 0.31 - lx,  m2y = vh * 0.71 - Math.round(326 * 1.18 * 0.62) - sit - ly;
    const m1x = vw * 0.08 - lx,  m1y = vh * 0.80 - Math.round(326 * 0.88 * 0.62) - sit - ly;

    /* Start: off the right edge at M4 height */
    const sx = vw + 70 - lx, sy = m4y;

    /* Arc helper — midpoint raised by `lift` px */
    const mid = (ax, ay, bx, by, lift) =>
      ({ x: (ax + bx) / 2, y: Math.min(ay, by) - lift });

    const a0 = mid(sx,  sy,  m4x, m4y, vh * 0.10); // approach arc
    const a1 = mid(m4x, m4y, m3x, m3y, vh * 0.15); // M4 → M3
    const a2 = mid(m3x, m3y, m2x, m2y, vh * 0.13); // M3 → M2
    const a3 = mid(m2x, m2y, m1x, m1y, vh * 0.11); // M2 → M1
    const a4 = { x: m1x * 0.28, y: -vh * 0.22 };   // M1 → logo

    /* Squish helper — flat, wide landing shape */
    const sq = (dx, dy, sc) =>
      `translate(${dx}px, ${dy + Math.round(sc * 8)}px) scaleX(${(sc * 1.08).toFixed(2)}) scaleY(${(sc * 0.88).toFixed(2)})`;

    const frames = [
      /* ─ Appear off right edge, large ───────────────────────────── */
      { transform: `translate(${sx}px, ${sy}px) scale(2.0)`,  opacity: 0,  offset: 0    },
      { transform: `translate(${sx}px, ${sy}px) scale(2.0)`,  opacity: 1,  offset: 0.03 },

      /* ─ Arc → M4 ─────────────────────────────────────────────── */
      { transform: `translate(${a0.x}px, ${a0.y}px) scale(1.88)`,  offset: 0.09 },
      { transform: `translate(${m4x}px, ${m4y}px) scale(1.75)`,    offset: 0.17 },
      { transform: sq(m4x, m4y, 1.75),                              offset: 0.20 },
      { transform: `translate(${m4x}px, ${m4y}px) scale(1.75)`,    offset: 0.23 },

      /* ─ Arc → M3 ─────────────────────────────────────────────── */
      { transform: `translate(${a1.x}px, ${a1.y}px) scale(1.60)`,  offset: 0.32 },
      { transform: `translate(${m3x}px, ${m3y}px) scale(1.48)`,    offset: 0.41 },
      { transform: sq(m3x, m3y, 1.48),                              offset: 0.44 },
      { transform: `translate(${m3x}px, ${m3y}px) scale(1.48)`,    offset: 0.47 },

      /* ─ Arc → M2 ─────────────────────────────────────────────── */
      { transform: `translate(${a2.x}px, ${a2.y}px) scale(1.34)`,  offset: 0.56 },
      { transform: `translate(${m2x}px, ${m2y}px) scale(1.22)`,    offset: 0.64 },
      { transform: sq(m2x, m2y, 1.22),                              offset: 0.67 },
      { transform: `translate(${m2x}px, ${m2y}px) scale(1.22)`,    offset: 0.70 },

      /* ─ Arc → M1 ─────────────────────────────────────────────── */
      { transform: `translate(${a3.x}px, ${a3.y}px) scale(1.11)`,  offset: 0.77 },
      { transform: `translate(${m1x}px, ${m1y}px) scale(1.01)`,    offset: 0.84 },
      { transform: sq(m1x, m1y, 1.01),                              offset: 0.86 },
      { transform: `translate(${m1x}px, ${m1y}px) scale(1.01)`,    offset: 0.88 },

      /* ─ Final leap → logo corner ──────────────────────────────── */
      { transform: `translate(${a4.x}px, ${a4.y}px) scale(0.99)`,  offset: 0.93 },
      { transform: `translate(0px, 0px) scale(1.06)`,               offset: 0.97 },
      { transform: `translate(0px, 0px) scale(1)`, opacity: 1,      offset: 1    },
    ];

    const anim = logo.animate(frames, {
      duration: 4800,
      delay: 400,
      easing: 'ease-in-out',
      fill: 'forwards',
    });

    anim.onfinish = () => {
      logo.style.transform = 'none';
      logo.style.opacity   = '1';
      anim.cancel();
      logo.classList.add('hop-done');
    };
  });
</script>
